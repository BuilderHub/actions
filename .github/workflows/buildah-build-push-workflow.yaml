---
# Build and push with Buildah: native multi-arch (ubuntu-latest + ubuntu-22.04-arm), then manifest list.
# Uses redhat-actions/buildah-build and buildah manifest for multi-arch.
# Caller must pass secrets REGISTRY_USERNAME and REGISTRY_PASSWORD via workflow_call secrets.
name: Buildah Build and Push

on:
  workflow_call:
    inputs:
      image:
        description: "Image name"
        required: true
        type: string
      tags:
        description: "Tags (space-separated)"
        required: false
        default: "latest"
        type: string
      containerfiles:
        description: "Containerfile paths (newline for multiple)"
        required: false
        default: "./Containerfile"
        type: string
      context:
        description: "Build context path"
        required: false
        default: "."
        type: string
      registry:
        description: "Registry host/namespace"
        required: true
        type: string
      push:
        description: "Push image to registry (false = build only)"
        required: false
        default: true
        type: boolean
    secrets:
      REGISTRY_USERNAME:
        description: "Registry username for push"
        required: true
      REGISTRY_PASSWORD:
        description: "Registry password or token for push"
        required: true

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE: ${{ inputs.image }}
  TAGS: ${{ inputs.tags }}

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          # GitHub-hosted ARM: use ubuntu-22.04-arm if available in your org, or a self-hosted arm64 label
          - runner: ubuntu-22.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to registry
        if: inputs.push
        uses: redhat-actions/podman-login@v1.7
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build (Buildah)
        id: build
        uses: redhat-actions/buildah-build@v2.13
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ env.TAGS }}
          containerfiles: ${{ inputs.containerfiles }}
          context: ${{ inputs.context }}

      - name: Tag and push arch-specific images
        if: inputs.push
        run: |
          # Resolve image ID by the reference the buildah-build action used (image:first_tag)
          img_id=$(buildah images -q "${{ steps.build.outputs.image-with-tag }}" | head -1)
          for t in ${{ env.TAGS }}; do
            ref="${{ env.REGISTRY }}/${{ env.IMAGE }}:${t}-${{ matrix.arch }}"
            buildah tag "$img_id" "$ref"
            buildah push "$ref"
          done

  manifest:
    if: inputs.push
    name: Create and push manifest
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Log in to registry
        uses: redhat-actions/podman-login@v1.7
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create and push manifest list
        run: |
          for tag in ${{ env.TAGS }}; do
            manifest="${{ env.REGISTRY }}/${{ env.IMAGE }}:${tag}"
            buildah manifest create "${manifest}"
            buildah manifest add "${manifest}" "docker://${{ env.REGISTRY }}/${{ env.IMAGE }}:${tag}-amd64"
            buildah manifest add "${manifest}" "docker://${{ env.REGISTRY }}/${{ env.IMAGE }}:${tag}-arm64"
            buildah manifest push --all "${manifest}"
          done
